<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Exchange Sort v1</title>
		<script type="text/javascript" src="https://d3js.org/d3.v3.js"></script>
		<link rel="stylesheet" href="./css/main.css">
	</head>
	<body>
		<div class="header">

			<div class="header_title">
				<div class="algo_name">Exchange Sort</div><div class="bigo">O(n<sup>2</sup>)</div>
				<div class="algo_type">Algorithm</div><div class="algo_version">Lowest</div>
		     	<div class="debug">Debug</div>
		     	<div class="toggle-switch"">
		       		<label><input id="debugToggle" type="checkbox" name="debugValue"><span class="slider"></span></label>
		     	</div>
		  	</div>
		
		  	<div class="header_settings">
		    	<div class="header_config">Scan Delay</div>
		    	<div class="header_slider">
		      		<input style="width:100%" id="scanSlider" type="range" name="scanSpeed" list="ticks_scan" min="50" max="300" value="75" label="Scan Speed" width="100%">
		  			<datalist id="ticks_scan">
	          			<option>50</option>
	          			<option>75</option>
						<option>150</option>
		          		<option>300</option>
		        	</datalist>  
		    	</div>
		    	<div class="header_output"><output id="scanValue">50</output></div>
		    
				<div class="header_config">Transition Speed</div>
		    	<div class="header_slider">
		  			<input style="width:100%" id="animationSlider" type="range" name="transitionSpeed" list="ticks_transition" min="300" max="1000" value="300" label="Transition Speed">
	        		<datalist id="ticks_transition">
	          			<option>300</option>
			       		<option>600</option>
		      			<option>750</option>
	          			<option>1000</option>
	    			</datalist>
				</div>
				<div class="header_output"><output id="animationValue">300</output></div>
		    
			</div>
		
			<div class="header_controller">
    			<div><b>Number Bars</b></div>
				<div></div>
    			<div class="header_slider">
      				<input style="width:100%" id="barsSlider" type="range" name="noBars" list="ticks" min="5" max="50" value="50" label="Number Bars">
        			<datalist id="ticks">
          				<option>5</option>
          				<option>10</option>
          				<option>25</option>
          				<option>50</option>
        			</datalist>
    			</div>
    			<div class="header_output"><output id="barsValue">50</output></div>
    			<div id="controller">
      				<div>
        				<button id="start">Start</button>
        				<button id="random" style="float:right">Randomise</button>
      				</div>
    			</div>
  			</div>

			<div class="header_metrics">
    			<div><b>Duration</b>:</div>
			    <div class="header_output"><output id="durationValue"></output></div>
			    <div><b>Reads</b>:</div>
			    <div class="header_output"><output id="readValue"></output></div>
			    <div><b>Comparisons</b>:</div>
			    <div class="header_output"><output id="compValue"></output></div>
			    <div><b>Writes</b>:</div>
			    <div class="header_output"<output id="wriValue"></output></div>
			    <div><b>Swaps</b>:</div>
			    <div class="header_output"><output id="swapValue"></div>
			    <div><b>Accesses</b>:</div>
			    <div class="header_output"><output id="accValue"></div>
			</div>
		</div>
		<script type="text/javascript" src="../d3-sort-utils/d3_sort_common.js"></script>
		<script type="text/javascript" src="../d3-sort-utils/d3_sort_ui.js"></script>
		<script type="text/javascript" src="../d3-sort-utils/d3_sort_animation.js"></script>
		<script type="text/javascript">

			// --------------------------------------------
			// FILE
			// --------------------------------------------
			// d3_sort_exchange_v1.html
			//
			// DESCRIPTION
			// --------------------------------------------
			// D3.js visualisation of the exchange sort
			// algorithm.
			//
			// AVAILABLE VERSIONS
			// --------------------------------------------
			// 1		Lowest value search
			// 2		Highest value search
			// 3 		Lowest & highest values search
			//
			// HISTORY
			// --------------------------------------------
			// 2026/01	Initial code
			// 2026/03  CSS Grid UI
			//
			// COMMENT
			// --------------------------------------------
			// The exchange sort can be looked at as a more
			// efficient gnome sort. It can also easily be
			// optimised leading to the insertion sort.
			//
			// REFERENCE
			// --------------------------------------------
			// https://en.wikipedia.org/wiki/Exchange_sort
			// --------------------------------------------

			async function lowestExchangeSort() {
				var j;

				for (var i=1; i<noData; i++) {

					if (startButton_status == "waiting") {
						console.log("[lowestExchangeSort] Stop Buttom Clicked: Exiting");
						break;
					}

					await highlightColourBar(i, colourScan, true);
					value = dataset[i];
					countReads++;
					countAccesses++;
					console.log("[lowestExchangeSort] i:" + i + " value[" + i + "]:" + value + " dataset:" + dataset);
					j = i-1;
					await highlightColourBar(i, colourScan, false);
					while ((j>=0) && dataset[j]>value) {

						if (startButton_status == "waiting") {
							console.log("[lowestSelectionSort] Stop Buttom Clicked: Exiting");
							break;
						}

						animationCount += 2;
						swapBars(j, j+1);
						await waitAnimationEnd();
						
						dataset[j+1] = dataset[j];
						dataset[j] = value;
						j--;

						countReads       += 2;
						countWrites      += 2;
						countAccesses    += 3;
						countSwaps       += 2;
						countComparisons += 1;			
					}
					console.log("[lowestExchangeSort] After swap dataset:" + dataset);				
				}
			}

			console.group("[Main]");
			configureSort(lowestExchangeSort);
			configureUI();
			startUI();
			console.groupEnd("[Main]");
			configureLogging();
		</script>
	</body>
</html>
